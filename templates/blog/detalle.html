{% extends 'base.html' %}

{% block title %}{{ post.titulo }} - hanssoto{% endblock %}

{% block content %}
<article class="px-6 py-16 max-w-3xl mx-auto">
    <p class="text-terminal-gray text-sm mb-2">root@hanssoto:~$ cat {{ post.slug }}.md</p>
    <p class="text-terminal-gray text-xs mb-2">{{ post.categoria }} · {{ post.creado|date:"d M Y" }}</p>
    <h1 class="text-3xl font-bold text-white mb-6">{{ post.titulo }}</h1>

    <div class="text-terminal-text leading-relaxed space-y-4">
        {{ post.contenido|linebreaks }}
    </div>

    <a href="{% url 'lista_posts' %}" class="inline-block mt-10 text-terminal-green hover:underline text-sm">
        ← cd ..
    </a>
</article>
{% endblock %}
