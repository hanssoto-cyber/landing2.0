{% extends 'base.html' %}

{% block title %}{{ post.titulo }} - hanssoto{% endblock %}

{% block content %}
<article>
    <h1>{{ post.titulo }}</h1>
    <p><small>{{ post.categoria }} · {{ post.creado|date:"d M Y" }}</small></p>
    <div>{{ post.contenido|linebreaks }}</div>
    <a href="{% url 'lista_posts' %}">← Volver al blog</a>
</article>
{% endblock %}
